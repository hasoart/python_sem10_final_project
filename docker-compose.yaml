name: object-detection-service

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Object Detection Service}
  DEBUG: ${DEBUG:-false}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-object_detection}
  DATABASE_ECHO: ${DATABASE_ECHO:-false}
  REDIS_URL: redis://redis:6379/0
  CELERY_APP_NAME: ${CELERY_APP_NAME:-object_detection_service}
  CELERY_TIMEZONE: ${CELERY_TIMEZONE:-UTC}
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-object-detection}
  YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-yolo11n.pt}
  YOLO_CONFIDENCE: ${YOLO_CONFIDENCE:-0.25}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: /app/.venv/bin/celery -A app.worker.celery_app:celery_app worker --loglevel=${CELERY_LOG_LEVEL:-info}
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: /app/.venv/bin/alembic upgrade head
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-object_detection}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-object-detection}
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET_NAME}
      "

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:
